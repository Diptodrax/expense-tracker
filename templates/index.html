<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Expense Tracker</h1>
            <p>Master your finances</p>
        </header>

        <section class="balance-cards">
            <div class="card balance-card">
                <h3>Total Balance</h3>
                <h2 id="balance">$0.00</h2>
            </div>
            <div class="card summary-card">
                <div class="income">
                    <h4>Income</h4>
                    <p id="income" class="money plus">+$0.00</p>
                </div>
                <div class="expense">
                    <h4>Expense</h4>
                    <p id="expense" class="money minus">-$0.00</p>
                </div>
            </div>
        </section>

        <section class="transaction-section">
            <h3>Add New Transaction</h3>
            <form id="form">
                <div class="form-control">
                    <label for="text">Title</label>
                    <input type="text" id="text" placeholder="Enter text..." required />
                </div>
                <div class="form-control">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount..." required step="0.01" />
                </div>
                <div class="form-control">
                    <label>Type</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="type" value="income" required> Income
                        </label>
                        <label>
                            <input type="radio" name="type" value="expense" checked required> Expense
                        </label>
                    </div>
                </div>
                <button class="btn">Add Transaction</button>
            </form>
        </section>

        <section class="history-section">
            <h3>Transaction History</h3>
            <ul id="list" class="list">
                <!-- Transactions will be inserted here -->
            </ul>
        </section>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
